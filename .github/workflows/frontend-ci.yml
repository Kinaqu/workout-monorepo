name: Frontend CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: frontend-ci-job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      GH_TOKEN: ${{ github.token }}
      STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark frontend-check pending
        run: >
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${STATUS_SHA}"
          -f state=pending
          -f context=frontend-check
          -f description="Frontend checks are running"
          -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend
        run: npm run check

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run local smoke tests
        env:
          EXPECT_CLERK_PUBLISHABLE_KEY: "false"
        run: npm run test:smoke:local

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Report frontend-check success
        if: success()
        run: >
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${STATUS_SHA}"
          -f state=success
          -f context=frontend-check
          -f description="Frontend checks passed"
          -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Report frontend-check failure
        if: failure()
        run: >
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${STATUS_SHA}"
          -f state=failure
          -f context=frontend-check
          -f description="Frontend checks failed"
          -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Report frontend-check cancellation
        if: cancelled()
        run: >
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${STATUS_SHA}"
          -f state=error
          -f context=frontend-check
          -f description="Frontend checks were cancelled"
          -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
