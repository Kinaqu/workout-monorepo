name: Bug report
description: Report a reproducible problem in the frontend, backend, or repository configuration.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the monorepo is affected?
      options:
        - frontend
        - backend
        - repository / docs / GitHub config
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so the issue can be reproduced.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, Node.js version, Wrangler version, or any other relevant context.
      placeholder: |
        OS:
        Browser:
        Node.js:
        Wrangler:
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or related links.
    validations:
      required: false
