<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Workout App</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="container">
    <div id="tab-today" class="tab-content active">
      <h1 class="section-title mb-4"><span class="section-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z"></path><path d="m2.5 21.5 1.4-1.4"></path><path d="m20.1 3.9 1.4-1.4"></path><path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z"></path><path d="m9.6 14.4 4.8-4.8"></path></svg></span><span>Today</span></h1>
      <div id="today-loader" class="loader"></div>
      <div id="today-error" class="error-message"></div>
      <div id="today-content" class="hidden">
        <div class="card today-overview-card">
          <div id="today-workout-name" class="card-title"></div>
          <div id="today-workout-type" class="card-subtitle"></div>
        </div>
        <div id="today-exercises"></div>
        <div id="today-rest-message" class="hidden text-center mt-4">
          <p>Today is a rest day. Recover!</p>
        </div>
        <div id="today-form-container" class="hidden">
          <button id="save-workout-btn">Save Workout</button>
        </div>
      </div>
    </div>

    <div id="tab-history" class="tab-content">
      <h1 class="section-title mb-4"><span class="section-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg></span><span>History</span></h1>
      <input type="date" id="history-date">
      <div id="history-loader" class="loader hidden"></div>
      <div id="history-error" class="error-message"></div>
      <div id="history-content">
        <div id="history-empty" class="text-center mt-4 hidden">No data for this day</div>
        <div id="history-data" class="hidden">
          <div class="card history-summary-card">
            <div id="history-workout-type" class="card-title"></div>
          </div>
          <div id="history-exercises"></div>
          <div class="card history-note-card">
            <div class="card-title">Note</div>
            <div id="history-note"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-program" class="tab-content">
      <h1 class="section-title mb-4"><span class="section-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h4"></path><path d="M2 10h4"></path><path d="M2 14h4"></path><path d="M2 18h4"></path><rect width="16" height="20" x="4" y="2" rx="2"></rect><path d="M9.5 8h5"></path><path d="M9.5 12H16"></path><path d="M9.5 16H14"></path></svg></span><span>Program</span></h1>
      <div id="program-loader" class="loader"></div>
      <div id="program-error" class="error-message"></div>
      <div id="program-content" class="hidden">
        <div class="card mb-4">
          <div class="card-title">Schedule</div>
          <div id="program-schedule"></div>
        </div>
        <h2 class="mb-4">Workouts</h2>
        <div id="program-workouts"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" data-tab="today">
      <div class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z"></path><path d="m2.5 21.5 1.4-1.4"></path><path d="m20.1 3.9 1.4-1.4"></path><path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z"></path><path d="m9.6 14.4 4.8-4.8"></path></svg></div>
      <span>Today</span>
    </div>
    <div class="nav-item" data-tab="history">
      <div class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg></div>
      <span>History</span>
    </div>
    <div class="nav-item" data-tab="program">
      <div class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h4"></path><path d="M2 10h4"></path><path d="M2 14h4"></path><path d="M2 18h4"></path><rect width="16" height="20" x="4" y="2" rx="2"></rect><path d="M9.5 8h5"></path><path d="M9.5 12H16"></path><path d="M9.5 16H14"></path></svg></div>
      <span>Program</span>
    </div>
  </nav>

  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
