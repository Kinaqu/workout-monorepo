<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Workout App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <!-- Tab 1: Today -->
    <div id="tab-today" class="tab-content active">
      <h1 class="mb-4">💪 Today</h1>
      <div id="today-loader" class="loader"></div>
      <div id="today-error" class="error-message"></div>
      <div id="today-content" class="hidden">
        <div class="card">
          <div id="today-workout-name" class="card-title"></div>
          <div id="today-workout-type" class="card-subtitle"></div>
        </div>
        <div id="today-exercises"></div>
        <div id="today-rest-message" class="hidden text-center mt-4">
          <p>Today is a rest day. Recover!</p>
        </div>
        <div id="today-form-container" class="hidden">
          <textarea id="today-note" placeholder="Notes for your workout..." rows="3"></textarea>
          <button id="save-workout-btn">Save Workout</button>
        </div>
      </div>
    </div>

    <!-- Tab 2: History -->
    <div id="tab-history" class="tab-content">
      <h1 class="mb-4">📅 History</h1>
      <input type="date" id="history-date">
      <div id="history-loader" class="loader hidden"></div>
      <div id="history-error" class="error-message"></div>
      <div id="history-content">
        <div id="history-empty" class="text-center mt-4 hidden">No data for this day</div>
        <div id="history-data" class="hidden">
          <div class="card">
            <div id="history-workout-type" class="card-title"></div>
          </div>
          <div id="history-exercises"></div>
          <div class="card">
            <div class="card-title">Note</div>
            <div id="history-note"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 3: Progress -->
    <div id="tab-progress" class="tab-content">
      <h1 class="mb-4">📈 Progress</h1>
      <button id="run-progression-btn" class="mb-4">Recalculate Progression</button>
      <div id="progress-loader" class="loader hidden"></div>
      <div id="progress-error" class="error-message"></div>
      <div id="progress-content" class="hidden">
        <div class="card">
          <div class="card-title">Changes</div>
          <div id="progress-changed"></div>
        </div>
        <div class="card">
          <div class="card-title">Skipped</div>
          <div id="progress-skipped"></div>
        </div>
      </div>
    </div>

    <!-- Tab 4: Program -->
    <div id="tab-program" class="tab-content">
      <h1 class="mb-4">📋 Program</h1>
      <div id="program-loader" class="loader"></div>
      <div id="program-error" class="error-message"></div>
      <div id="program-content" class="hidden">
        <div class="card mb-4">
          <div class="card-title">Schedule</div>
          <div id="program-schedule"></div>
        </div>
        <h2 class="mb-4">Workouts</h2>
        <div id="program-workouts"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-tab="today">
      <div class="nav-icon">💪</div>
      <span>Today</span>
    </div>
    <div class="nav-item" data-tab="history">
      <div class="nav-icon">📅</div>
      <span>History</span>
    </div>
    <div class="nav-item" data-tab="progress">
      <div class="nav-icon">📈</div>
      <span>Progress</span>
    </div>
    <div class="nav-item" data-tab="program">
      <div class="nav-icon">📋</div>
      <span>Program</span>
    </div>
  </nav>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
